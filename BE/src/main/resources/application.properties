spring.application.name=SmartQueue

# JWT (HS256 requires a key length >= 256 bits for JJWT)
jwt.secret=mySuperSecretKeymySuperSecretKeymySuperSecretKey12
jwt.expiration-ms=86400000

# DATABASE
spring.datasource.url=jdbc:mysql://localhost:3306/smartqueue
spring.datasource.username=root
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate
spring.jpa.properties.hibernate.format_sql=true

# Driver
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Demo dataset (true/false)
app.data.seed=true